<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanna Bet?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blob blob-a"></div>
  <div class="bg-blob blob-b"></div>
  <div class="bg-blob blob-c"></div>

  <section id="authRoot" class="auth-root">
    <h1 class="auth-title">Wanna Bet?</h1>
    <div id="authPanel" class="card auth-panel">
      <h2 id="authHeading">Login</h2>
      <p id="authSubtext">Use your account to continue.</p>
      <form id="authForm">
        <label>
          Username
          <input id="authUsername" type="text" minlength="3" maxlength="24" required />
        </label>
        <label>
          Password
          <input id="authPassword" type="password" minlength="8" maxlength="72" required />
        </label>
        <button id="authSubmit" type="submit">Login</button>
      </form>
      <button id="authToggle" class="secondary" type="button">Create new account</button>
      <p id="authMsg" class="auth-msg"></p>
    </div>
  </section>

  <div id="appRoot" class="hidden">
    <header class="hero">
      <h1>Wanna Bet?</h1>
      <p>Raise a bet, get agreement, and close by matching winner votes.</p>
      <div class="session-row">
        <span id="sessionUser" class="pill">Logged in: -</span>
        <button id="resetPwdBtn" class="secondary logout" type="button">Reset Password</button>
        <button id="logoutBtn" class="secondary logout" type="button">Logout</button>
      </div>
    </header>

    <main class="layout">
      <section class="card creator">
        <h2>Raise A New Bet</h2>
        <form id="betForm">
          <label>
            Bet title
            <input id="betTitle" type="text" maxlength="80" required />
          </label>

          <label>
            Details
            <textarea id="betDetails" rows="3" maxlength="300" required></textarea>
          </label>

          <label>
            Winner gets?
            <input id="betPrize" type="text" maxlength="120" required />
          </label>

          <label>
            Opponent
            <select id="betOpponent" required></select>
          </label>

          <button type="submit">Launch Bet</button>
        </form>
      </section>

      <section class="card live">
        <div class="panel-title">
          <h2>Live Bets</h2>
          <span id="liveCount" class="pill">0 live bets</span>
        </div>
        <div id="liveBets" class="bets"></div>
      </section>

      <section class="card history">
        <div class="panel-title">
          <h2>Bet History</h2>
          <span id="historyCount" class="pill">0 completed bets</span>
        </div>
        <div id="historyBets" class="bets history-grid"></div>
      </section>
    </main>

    <template id="liveBetTemplate">
      <article class="bet-card">
        <div class="bet-head">
          <div class="title-row">
            <h3 class="bet-title"></h3>
          </div>
          <span class="status"></span>
        </div>
        <p class="bet-details"></p>
        <p class="bet-meta"></p>
        <div class="bet-actions"></div>
      </article>
    </template>

    <template id="historyBetTemplate">
      <article class="bet-card history-card">
        <div class="bet-head">
          <div class="title-row">
            <h3 class="bet-title"></h3>
          </div>
          <span class="winner"></span>
        </div>
        <p class="bet-details"></p>
        <p class="bet-meta"></p>
      </article>
    </template>
  </div>

  <script src="script.js"></script>
</body>
</html>
